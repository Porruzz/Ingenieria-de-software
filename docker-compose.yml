version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: enrollment_user
      POSTGRES_PASSWORD: enrollment_pass
      POSTGRES_DB: enrollment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Este script se ejecutará automáticamente la primera vez que se inicia la DB
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
